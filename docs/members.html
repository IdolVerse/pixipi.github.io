<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Pixipi</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Navigation -->
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="videos.html">Videos</a>
      <a href="contact.html">Contact</a>
      <a id="loginNavBtn" href="portal.html">🔑 Log In</a>
    </nav>

    <!-- Members Section -->
    <div class="members-container">
      <div class="members-list">
        <h2>Members</h2>
        <div class="member-grid" id="memberGrid">
          <!-- Member cards will be generated here -->
        </div>
        
      </div>

      <div class="member-detail">
        <div id="memberDetailContent" class="detail-content">
          <p style="text-align: center; color: #999; margin-top: 50px;">Click on a member to view details</p>
        </div>
      </div>
    </div>


    <footer>
      Follow Pixipi on
      <a href="https://www.instagram.com/pixipi_exe?igsh=MWR5ZDhnNTRvdjA4ZQ==" target="_blank" rel="noopener noreferrer">Instagram</a>
      <span>·</span>
      <a href="https://xhslink.com/m/AtFuH3oz3Lz" target="_blank" rel="noopener noreferrer">RedNote</a>
      <span>·</span>
      <a href="https://youtube.com/@ksm_doll_trap?si=y9Q1hdPEBzB3alXG" target="_blank" rel="noopener noreferrer">YouTube</a>
    </footer>

    <script>
      const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? 'http://localhost:8787/api'
        : 'https://api.dolltrap.workers.dev/api';
      const authToken = localStorage.getItem('authToken');
      const adminToken = authToken; // alias used in message functions
      const memberToken = localStorage.getItem('memberToken');

      function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; } 
      }
      const me = parseJwt(memberToken);
      function updateNavLoginState() {
        const btn = document.getElementById('loginNavBtn');
        if (!btn) return;
        const adminTok = localStorage.getItem('authToken');
        const memberTok = localStorage.getItem('memberToken');
        if (adminTok) {
          const p = parseJwt(adminTok);
          btn.textContent = '⚙️ ' + (p?.username || 'Admin');
          btn.href = 'admin.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else if (memberTok) {
          const p = parseJwt(memberTok);
          btn.textContent = '🎀 ' + (p?.display_name || 'Portal');
          btn.href = 'portal.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else {
          btn.textContent = '🔑 Log In';
          btn.href = 'portal.html';
          btn.style.background = '';
        }
      }
      const membersData = [
        {
          id: 1,
          name: 'KOKONA',
          image: 'images/kokona-chibi.png',
          mbti: 'ENFP',
          birthday: 'July 31st',
          birthdayMonth: 7, birthdayDay: 31,
          color: 'Blue',
          colorHex: '#60a5fa',
          level: '01',
          trainee: false,
          socials: [
            { icon: '📸', label: 'Instagram', url: 'https://www.instagram.com/kokona_oh?igsh=MTgwcTlyM3o2ZGUzaQ%3D%3D&utm_source=qr' },
          ]
        },
        {
          id: 2,
          name: 'BUZZLY',
          image: 'images/buzzly-chibi.png',
          mbti: 'ENFJ',
          birthday: 'Jan 16th',
          birthdayMonth: 1, birthdayDay: 16,
          color: 'Pink',
          colorHex: '#f472b6',
          level: '01',
          trainee: false,
          socials: [
            { icon: '📸', label: 'Instagram', url: 'https://www.instagram.com/buzz_zzly?igsh=YWd2MXU4b3d4amQ=' },
          ]
        },
        {
          id: 3,
          name: 'SHANI',
          image: 'images/shani-chibi.png',
          mbti: '',
          birthday: '',
          birthdayMonth: null, birthdayDay: null,
          color: 'Red',
          colorHex: '#f87171',
          level: '01',
          trainee: true,
          socials: []
        },
        {
          id: 4,
          name: 'TOKIYO',
          image: 'images/tokiyo-chibi.png',
          mbti: '',
          birthday: '',
          birthdayMonth: null, birthdayDay: null,
          color: 'Orange',
          colorHex: '#fb923c',
          level: '01',
          trainee: true,
          socials: []
        }
      ];

      // Render member grid
      function renderMembers() {
        const memberGrid = document.getElementById('memberGrid');
        memberGrid.innerHTML = '';

        membersData.forEach(member => {
          const memberCard = document.createElement('div');
          memberCard.className = 'member-card';
          memberCard.style.borderColor = member.colorHex;
          memberCard.style.boxShadow = `0 0 14px ${member.colorHex}44`;
          memberCard.innerHTML = `
            <div class="member-card-level">Lv ${member.level}</div>
            <img src="${member.image}" alt="${member.name}">
            <h3 style="color:${member.colorHex}">${member.name}</h3>
            ${member.trainee ? `<div class="member-card-trainee-badge">研修生</div>` : ''}
          `;
          memberCard.addEventListener('click', () => showMemberDetail(member));
          memberGrid.appendChild(memberCard);
        });
      }

      function birthdayCountdown(month, day) {
        const now = new Date();
        const thisYear = now.getFullYear();
        let next = new Date(thisYear, month - 1, day);
        if (next <= now) next = new Date(thisYear + 1, month - 1, day);
        const diff = Math.ceil((next - now) / (1000 * 60 * 60 * 24));
        if (diff === 0) return '🎉 TODAY!';
        if (diff === 1) return '🎁 Tomorrow!';
        return `${diff} days away`;
      }

      // Show member details
      function showMemberDetail(member) {
        const detailContent = document.getElementById('memberDetailContent');
        const countdown = member.birthdayMonth ? birthdayCountdown(member.birthdayMonth, member.birthdayDay) : null;
        detailContent.innerHTML = `
          <button class="back-btn" onclick="backToList()">← Back</button>
          <div class="detail-header">
            <img src="${member.image}" alt="${member.name}" class="detail-image" style="border-color:${member.colorHex};box-shadow:0 0 16px ${member.colorHex}66">
            <div class="detail-info">
              <h2 style="color:${member.colorHex};text-shadow:0 0 12px ${member.colorHex}66">${member.name}</h2>
              ${member.trainee ? `<div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--orange);border:1px solid var(--orange);border-radius:3px;padding:3px 8px;display:inline-block;margin-bottom:10px">研修生 Trainee</div>` : ''}
              <div class="member-color-swatch">
                <span class="swatch-dot" style="background:${member.colorHex}"></span>
                <span class="swatch-label">${member.color}</span>
              </div>
              <div class="detail-stat">
                ${member.mbti ? `<p><strong>MBTI:</strong> ${member.mbti}</p>` : ''}
                ${member.birthday ? `<p><strong>Birthday:</strong> ${member.birthday} <span class="birthday-countdown">🎂 ${countdown}</span></p>` : ''}
              </div>
              <div class="detail-action-row">
                ${member.socials?.length ? member.socials.map(s => `<a class="social-link" href="${s.url}" target="_blank" rel="noopener">${s.icon} ${s.label}</a>`).join('') : ''}
              </div>
            </div>
            <div class="detail-level">Lv ${member.level}</div>
          </div>
          <div class="member-gallery-section">
            <div class="member-gallery-title">🖼️ Photos</div>
            <div class="member-gallery" id="memberGallery-${member.name}">
              <div class="msg-loading">Loading photos…</div>
            </div>
          </div>

          <div class="msg-board">
            <div class="msg-board-title">💬 Fan Messages</div>
            ${memberToken ? `
            <form class="msg-form" onsubmit="postMessage(event, '${member.name}')">
              <textarea id="msgInput" placeholder="Leave a message for ${member.name}..." maxlength="300" required></textarea>
              <button type="submit" class="msg-submit">Send ❤️</button>
            </form>` : `<p class="msg-login-hint"><a href="portal.html">🔑 Sign in</a> to leave a message</p>`}
            <div class="msg-list" id="msgList-${member.name}"><div class="msg-loading">Loading messages...</div></div>
          </div>
        `;
        loadMessages(member.name);
        loadMemberGallery(member.name);
      }

      function thumbUrl(url, width = 400) {
        if (!url || !url.includes('/storage/v1/object/public/')) return url;
        return url.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/') + `?width=${width}&quality=75`;
      }
      function imgWithFallback(thumb, original, alt = '') {
        return `<img src="${thumb}" alt="${alt}" onerror="this.onerror=null;this.src='${original}'" loading="lazy">`;
      }

      // ── Member photo gallery ─────────────────────────────────────────
      async function loadMemberGallery(idolName) {
        const el = document.getElementById(`memberGallery-${idolName}`);
        if (!el) return;
        try {
          const res = await fetch(`${API_URL}/photos/member/${encodeURIComponent(idolName)}`);
          const data = res.ok ? await res.json() : [];
          if (data.length === 0) {
            el.innerHTML = '<span class="gallery-empty">No photos yet 📷</span>';
            return;
          }
          // Shuffle and show up to 6
          const shuffled = data.slice().sort(() => Math.random() - 0.5).slice(0, 6);
          el.innerHTML = shuffled.map(p => `
            <a class="gallery-thumb" href="${p.photo_url}" target="_blank" rel="noopener">
              ${imgWithFallback(thumbUrl(p.photo_url), p.photo_url, p.caption || idolName)}
            </a>`).join('');
          if (data.length > 0) {
            el.insertAdjacentHTML('afterend', `
              <a class="member-gallery-more" href="gallery.html">View More in Gallery →</a>`);
          }
        } catch {
          el.innerHTML = '<span class="gallery-empty">Could not load photos.</span>';
        }
      }

      async function loadMessages(idolName) {
        const list = document.getElementById(`msgList-${idolName}`);
        if (!list) return;
        try {
          const res = await fetch(`${API_URL}/members/messages/${encodeURIComponent(idolName)}`);
          const data = res.ok ? await res.json() : [];
          if (data.length === 0) {
            list.innerHTML = '<div class="msg-empty">No messages yet. Be the first! 🌸</div>';
            return;
          }
          list.innerHTML = data.map(m => `
            <div class="msg-item" id="msg-${m.id}">
              <div class="msg-meta">
                <span class="msg-author">${m.display_name}</span>
                <span class="msg-date">${new Date(m.created_at).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})}</span>
                ${me && me.id === m.member_id ? `<button class="msg-delete" onclick="deleteMessage(${m.id}, '${idolName}')">×</button>` : ''}
                ${adminToken && !(me && me.id === m.member_id) ? `<button class="msg-delete" title="Admin: delete" onclick="adminDeleteMessage(${m.id}, '${idolName}')">×</button>` : ''}
              </div>
              <div class="msg-content">${m.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            </div>`).join('');
        } catch {
          list.innerHTML = '<div class="msg-empty">Could not load messages.</div>';
        }
      }

      async function postMessage(e, idolName) {
        e.preventDefault();
        if (!memberToken) return;
        const input = document.getElementById('msgInput');
        const content = input.value.trim();
        if (!content) return;
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        try {
          const res = await fetch(`${API_URL}/members/messages/${encodeURIComponent(idolName)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${memberToken}` },
            body: JSON.stringify({ content })
          });
          if (res.ok) { input.value = ''; loadMessages(idolName); }
          else { const d = await res.json(); alert(d.error || 'Failed to send'); }
        } catch { alert('Failed to send'); }
        btn.disabled = false;
      }

      async function deleteMessage(id, idolName) {
        if (!memberToken || !confirm('Delete this message?')) return;
        const res = await fetch(`${API_URL}/members/messages/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${memberToken}` }
        }).catch(() => null);
        if (res?.ok) loadMessages(idolName);
      }

      async function adminDeleteMessage(id, idolName) {
        if (!adminToken || !confirm('Delete this message as admin?')) return;
        const res = await fetch(`${API_URL}/members/messages/admin/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${adminToken}` }
        }).catch(() => null);
        if (res?.ok) loadMessages(idolName);
      }

      // Back to member list → restore group board
      function backToList() {
        showGroupBoard();
      }

      // ── Group message board (DollTrap) ────────────────────────────────
      const GROUP_IDOL = 'DollTrap';

      function showGroupBoard() {
        const detailContent = document.getElementById('memberDetailContent');
        const formHtml = memberToken
          ? `<form class="msg-form" onsubmit="postGroupMessage(event)">
               <textarea id="groupMsgInput" placeholder="Write your message here..." maxlength="300" required></textarea>
               <button type="submit" class="msg-submit">Send ❤️</button>
             </form>`
          : `<p class="msg-login-hint"><a href="portal.html">🔑 Sign in</a> to leave a message</p>`;
        detailContent.innerHTML = `
          <div class="group-board-panel">
            <h3>💌 Message Board</h3>
            <p class="group-board-sub">Leave a message for Pixipi!</p>
            <div class="msg-board" style="border-top:none;margin-top:0;padding-top:0;">
              <div id="groupMsgForm">${formHtml}</div>
              <div class="msg-list" id="groupMsgList"><div class="msg-loading">Loading messages...</div></div>
            </div>
          </div>`;
        loadGroupMessages();
      }

      async function loadGroupMessages() {
        const list = document.getElementById('groupMsgList');
        if (!list) return;
        try {
          const res = await fetch(`${API_URL}/members/messages/${GROUP_IDOL}`);
          const data = res.ok ? await res.json() : [];
          if (data.length === 0) {
            list.innerHTML = '<div class="msg-empty">No messages yet. Be the first! 🌸</div>';
            return;
          }
          list.innerHTML = data.map(m => `
            <div class="msg-item" id="gmsg-${m.id}">
              <div class="msg-meta">
                <span class="msg-author">${m.display_name}</span>
                <span class="msg-date">${new Date(m.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
                ${me && me.id === m.member_id ? `<button class="msg-delete" onclick="deleteGroupMessage(${m.id})">×</button>` : ''}
                ${adminToken && !(me && me.id === m.member_id) ? `<button class="msg-delete" title="Admin: delete" onclick="adminDeleteGroupMessage(${m.id})">×</button>` : ''}
              </div>
              <div class="msg-content">${m.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            </div>`).join('');
        } catch {
          list.innerHTML = '<div class="msg-empty">Could not load messages.</div>';
        }
      }

      async function postGroupMessage(e) {
        e.preventDefault();
        if (!memberToken) return;
        const input = document.getElementById('groupMsgInput');
        const content = input.value.trim();
        if (!content) return;
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        try {
          const res = await fetch(`${API_URL}/members/messages/${GROUP_IDOL}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${memberToken}` },
            body: JSON.stringify({ content })
          });
          if (res.ok) { input.value = ''; loadGroupMessages(); }
          else { const d = await res.json(); alert(d.error || 'Failed to send'); }
        } catch { alert('Failed to send'); }
        btn.disabled = false;
      }

      async function deleteGroupMessage(id) {
        if (!memberToken || !confirm('Delete this message?')) return;
        const res = await fetch(`${API_URL}/members/messages/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${memberToken}` }
        }).catch(() => null);
        if (res?.ok) loadGroupMessages();
      }

      async function adminDeleteGroupMessage(id) {
        if (!adminToken || !confirm('Delete this message as admin?')) return;
        const res = await fetch(`${API_URL}/members/messages/admin/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${adminToken}` }
        }).catch(() => null);
        if (res?.ok) loadGroupMessages();
      }

      // Initialize
      updateNavLoginState();
      renderMembers();
      showGroupBoard();


    </script>
  </body>
</html>
