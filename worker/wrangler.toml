name = "api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pixipi-db"
database_id = "e6e52936-3b48-4d86-8b52-9d07eef0e5cc"

[[r2_buckets]]
binding = "R2"
bucket_name = "pixipi-photos"

# Secrets (set via `wrangler secret put <NAME>`):
#   JWT_SECRET    — JWT signing secret
#   R2_PUBLIC_URL — public base URL for R2 bucket, e.g. https://media.pixipiexe.com
#                   (set after enabling public access on the bucket)

[vars]
NODE_ENV = "production"
