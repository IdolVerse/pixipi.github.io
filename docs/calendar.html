<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Pixipi</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Navigation -->
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="videos.html">Videos</a>
      <a href="contact.html">Contact</a>
      <a id="loginNavBtn" href="portal.html">🔑 Log In</a>
    </nav>

    <!-- Events Page -->
    <div class="calendar-container">
      <h1>Events</h1>

      <!-- View Toggle -->
      <div class="ev-view-toggle">
        <button class="ev-view-btn active" id="btnCalView" onclick="switchView('calendar')">📅 Calendar</button>
        <button class="ev-view-btn" id="btnListView" onclick="switchView('list')">☰ List</button>
      </div>

      <!-- ── Calendar View ── -->
      <div id="calendarViewContainer">
        <div class="cal-layout">
          <div class="cal-main">
            <div class="cal-logo">
              <div class="cal-logo-badge">
                <div class="cal-logo-dots"><span></span><span></span><span></span></div>
                <div class="cal-logo-name">PIXIPI</div>
                <div class="cal-logo-sub">★ EVENTS ★</div>
              </div>
            </div>
            <table class="calendar-table" id="calendarTable">
              <thead>
                <tr>
                  <th>Sun</th>
                  <th>Mon</th>
                  <th>Tue</th>
                  <th>Wed</th>
                  <th>Thu</th>
                  <th>Fri</th>
                  <th>Sat</th>
                </tr>
              </thead>
              <tbody id="calendarBody"></tbody>
            </table>
            <div class="calendar-controls">
              <button id="prevBtn">←</button>
              <div class="calendar-month" id="monthYear"></div>
              <button id="nextBtn">→</button>
            </div>
          </div>

          <div class="cal-sidebar">
            <div class="events-section" id="eventsSection" style="display:none;"></div>
            <div class="next-event-section" id="nextEventSection">
              <h3>Next Upcoming Event</h3>
              <div id="nextEventContent"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── List View ── -->
      <div id="listViewContainer" style="display:none">
        <div id="listViewContent">
          <p style="text-align:center;color:#999;padding:40px 0;">Loading events…</p>
        </div>
      </div>
    </div>

    <footer>
      Follow Pixipi on
      <a href="https://www.instagram.com/pixipi_exe?igsh=MWR5ZDhnNTRvdjA4ZQ==" target="_blank" rel="noopener noreferrer">Instagram</a>
      <span>·</span>
      <a href="https://xhslink.com/m/AtFuH3oz3Lz" target="_blank" rel="noopener noreferrer">RedNote</a>
      <span>·</span>
      <a href="https://youtube.com/@ksm_doll_trap?si=y9Q1hdPEBzB3alXG" target="_blank" rel="noopener noreferrer">YouTube</a>
    </footer>

    <!-- Event Detail Modal (kept for legacy fallback) -->
    <div id="eventDetailModal" class="event-modal-overlay" style="display:none;" onclick="closeEventModal(event)">
      <div class="event-modal-box">
        <button class="event-modal-close" onclick="closeEventModal()">&times;</button>
        <div id="eventModalPosterWrap" class="event-modal-poster" style="display:none;">
          <img id="eventModalPoster" src="" alt="Event Poster">
        </div>
        <div class="event-modal-body">
          <div id="eventModalCategory" class="event-modal-tag"></div>
          <h2 id="eventModalTitle"></h2>
          <div id="eventModalDate" class="event-modal-meta" style="display:none;"></div>
          <div id="eventModalLocation" class="event-modal-meta" style="display:none;"></div>
          <div id="eventModalDesc" class="event-modal-desc" style="display:none;"></div>
          <div class="event-modal-actions">
            <a id="eventModalPhotosLink" href="#" class="event-modal-photos-btn" style="display:none;">📸 View Photos</a>
            <a id="eventModalVideosLink" href="videos.html" class="event-modal-photos-btn" style="display:none; background: linear-gradient(135deg, #7c3aed, #ec4899);">🎬 View All Videos</a>
          </div>
          <div id="eventModalVideos" class="event-video-links" style="display:none;"></div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? 'https://api.cocolee-k2.workers.dev/api'
        : 'https://api.cocolee-k2.workers.dev/api';
      let memberToken = localStorage.getItem('memberToken');
      let allVideosData = [];
      let allPhotosData = [];
      let currentModalEventId = null;

      function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
      }
      function updateNavLoginState() {
        const btn = document.getElementById('loginNavBtn');
        if (!btn) return;
        const adminTok = localStorage.getItem('authToken');
        const memberTok = localStorage.getItem('memberToken');
        if (adminTok) {
          const p = parseJwt(adminTok);
          btn.textContent = '⚙️ ' + (p?.username || 'Admin');
          btn.href = 'admin.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else if (memberTok) {
          const p = parseJwt(memberTok);
          btn.textContent = '🎀 ' + (p?.display_name || 'Portal');
          btn.href = 'portal.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else {
          btn.textContent = '🔑 Log In';
          btn.href = 'portal.html';
          btn.style.background = '';
        }
      }

      // ── State ──────────────────────────────────────────
      let events = {};
      let currentDate = new Date();
      let currentView = 'calendar';
      const EVENT_CATEGORY_OPTIONS = ['Live', 'Performance', 'Community Event', 'Convention', 'Workshop', 'Collaboration', 'Other'];

      function normalizeEventCategory(value) {
        if (!value) return null;
        const normalizedValue = String(value).trim().toLowerCase();
        const match = EVENT_CATEGORY_OPTIONS.find(option => option.toLowerCase() === normalizedValue);
        return match || null;
      }

      function getEventCategory(event) {
        const directCategory = normalizeEventCategory(event.event_category || event.category);
        if (directCategory) return directCategory;
        const descriptionPrefix = event.description?.split(/\s[-–—]\s/)[0]?.trim();
        return normalizeEventCategory(descriptionPrefix);
      }

      // ── View Toggle ────────────────────────────────────
      function switchView(view) {
        currentView = view;
        const calContainer = document.getElementById('calendarViewContainer');
        const listContainer = document.getElementById('listViewContainer');
        const btnCal = document.getElementById('btnCalView');
        const btnList = document.getElementById('btnListView');

        if (view === 'calendar') {
          calContainer.style.display = '';
          listContainer.style.display = 'none';
          btnCal.classList.add('active');
          btnList.classList.remove('active');
        } else {
          calContainer.style.display = 'none';
          listContainer.style.display = '';
          btnCal.classList.remove('active');
          btnList.classList.add('active');
          renderListView();
        }
      }

      // ── List View ──────────────────────────────────────
      function renderListView() {
        const container = document.getElementById('listViewContent');
        const now = new Date();
        now.setHours(0, 0, 0, 0);

        // Flatten all events with date objects
        const allEvents = [];
        for (const dateStr in events) {
          const [y, m, d] = dateStr.split('-').map(Number);
          const dateObj = new Date(y, m - 1, d);
          events[dateStr].forEach(ev => {
            allEvents.push({ ...ev, date: dateStr, dateObj });
          });
        }
        allEvents.sort((a, b) => a.dateObj - b.dateObj);

        const upcoming = allEvents.filter(e => e.dateObj >= now);
        const past     = allEvents.filter(e => e.dateObj < now).reverse(); // most recent first

        function buildCard(ev) {
          const d = ev.dateObj;
          const dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
          const badge = ev.category ? `<span class="ev-list-badge">${ev.category}</span>` : '';
          const loc   = ev.location ? `<span class="ev-list-meta-item">📍 ${ev.location}</span>` : '';
          const hasTime = ev.time && ev.time !== '12:00 AM';
          const time  = hasTime ? `<span class="ev-list-meta-item">🕐 ${ev.time}${ev.end_time ? ' – ' + ev.end_time : ''}</span>` : '';
          return `
            <div class="ev-list-card" data-id="${ev.id || ''}">
              <div class="ev-list-card-top">
                ${badge}
                <span class="ev-list-card-date">📅 ${dateStr}</span>
              </div>
              <h3 class="ev-list-card-title">${ev.title}</h3>
              <div class="ev-list-card-meta">${time}${loc}</div>
              <span class="ev-list-card-arrow">View details →</span>
            </div>
          `;
        }

        let html = '';
        if (upcoming.length > 0) {
          html += `<div class="ev-list-section-label">Upcoming</div>`;
          html += upcoming.map(buildCard).join('');
        }
        if (past.length > 0) {
          html += `<div class="ev-list-section-label past">Past Events</div>`;
          html += past.map(ev => buildCard(ev)).join('');
        }
        if (allEvents.length === 0) {
          html = '<p style="text-align:center;color:#999;padding:60px 0;">No events yet</p>';
        }

        container.innerHTML = html;

        // Attach click handlers
        container.querySelectorAll('.ev-list-card[data-id]').forEach(card => {
          const id = card.dataset.id;
          if (id) {
            card.addEventListener('click', () => {
              window.location.href = `event.html?id=${id}&from=list`;
            });
          }
        });
      }

      // ── Calendar Render ────────────────────────────────
      function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
          'July', 'August', 'September', 'October', 'November', 'December'];
        document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();

        const calendarBody = document.getElementById('calendarBody');
        calendarBody.innerHTML = '';

        let date = 1;
        let nextMonthDate = 1;

        for (let i = 0; i < 6; i++) {
          const row = document.createElement('tr');

          for (let j = 0; j < 7; j++) {
            const cell = document.createElement('td');

            if (i === 0 && j < firstDay) {
              cell.textContent = daysInPrevMonth - firstDay + j + 1;
              cell.classList.add('other-month');
            } else if (date > daysInMonth) {
              cell.textContent = nextMonthDate;
              cell.classList.add('other-month');
              nextMonthDate++;
            } else {
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;

              const hasEvent = !!events[dateStr];
              if (hasEvent) {
                const eventDate = new Date(year, month, date);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                eventDate.setHours(0, 0, 0, 0);
                cell.classList.add(eventDate < today ? 'past-event' : 'has-event');
              }

              const today = new Date();
              if (date === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                cell.classList.add('today');
              }

              cell.innerHTML = `<div class="day-bubble">${date}${hasEvent ? '<span class="event-dot"></span>' : ''}</div>`;

              cell.dataset.date = dateStr;
              cell.addEventListener('click', function() { showEvents(dateStr); });
              date++;
            }

            row.appendChild(cell);
          }
          calendarBody.appendChild(row);
        }
      }

      function showEvents(dateStr) {
        const [year, month, day] = dateStr.split('-');
        const dateObj = new Date(year, month - 1, day);
        const formattedDate = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        const eventsList = document.getElementById('eventsSection');
        const dayEvents = events[dateStr];

        eventsList.style.display = 'block';
        if (dayEvents && dayEvents.length > 0) {
          eventsList.innerHTML = `<h3>Events on ${formattedDate}</h3>` + dayEvents.map((event, i) => `
            <div class="event-item event-item-clickable" data-date="${dateStr}" data-idx="${i}">
              <h4>${event.title}</h4>
              <p><span class="event-type">${event.category || event.type}</span></p>
              <p><strong>Time:</strong> ${event.time}${event.end_time ? ` – ${event.end_time}` : ''}</p>
              ${event.location ? `<p><strong>Location:</strong> ${event.location}</p>` : ''}
              <span class="event-item-more">View details →</span>
            </div>
          `).join('');
          eventsList.querySelectorAll('[data-date]').forEach(el => {
            el.addEventListener('click', () => {
              const ev = calendarEventForDate(el.dataset.date, parseInt(el.dataset.idx));
              if (ev && ev.id) {
                window.location.href = `event.html?id=${ev.id}&from=calendar`;
              } else {
                openEventModal({ ...ev, displayDate: formattedDate });
              }
            });
          });
        } else {
          eventsList.innerHTML = `<h3>Events on ${formattedDate}</h3><div class="no-events">No events scheduled for this date</div>`;
        }
      }

      function calendarEventForDate(dateStr, index) {
        return (events[dateStr] || [])[index] || {};
      }

      function getNextEvent() {
        const allEvents = [];
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        for (const dateStr in events) {
          const [yearStr, monthStr, dayStr] = dateStr.split('-');
          const dateObj = new Date(parseInt(yearStr), parseInt(monthStr) - 1, parseInt(dayStr));
          events[dateStr].forEach(event => {
            allEvents.push({
              date: dateStr,
              dateObj,
              displayDate: dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
              ...event
            });
          });
        }
        allEvents.sort((a, b) => a.dateObj - b.dateObj);
        return allEvents.find(ev => {
          const d = new Date(ev.dateObj);
          d.setHours(0, 0, 0, 0);
          return d >= today;
        });
      }

      function displayNextEvent() {
        const nextEvent = getNextEvent();
        const nextEventContent = document.getElementById('nextEventContent');

        if (nextEvent) {
          nextEventContent.innerHTML = `
            <div class="next-event-card event-item-clickable" data-event-key="next">
              <div class="next-event-date">${nextEvent.displayDate}</div>
              <h4>${nextEvent.title}</h4>
              <p><span class="event-type">${nextEvent.category || nextEvent.type || 'Event'}</span></p>
              <p><strong>Time:</strong> ${nextEvent.time}${nextEvent.end_time ? ` – ${nextEvent.end_time}` : ''}</p>
              <button class="jump-btn" onclick="event.stopPropagation(); jumpToDate('${nextEvent.date}')">View in Calendar</button>
              <span class="event-item-more" style="display:block; margin-top:8px;">View details →</span>
            </div>
          `;
          document.querySelector('[data-event-key="next"]').addEventListener('click', function(e) {
            if (e.target.classList.contains('jump-btn')) return;
            if (nextEvent && nextEvent.id) {
              window.location.href = `event.html?id=${nextEvent.id}&from=${currentView}`;
            }
          });
        } else {
          nextEventContent.innerHTML = '<div class="no-events">No upcoming events scheduled</div>';
        }
      }

      function jumpToDate(dateStr) {
        const [yearStr, monthStr] = dateStr.split('-');
        currentDate = new Date(parseInt(yearStr), parseInt(monthStr) - 1, 1);
        switchView('calendar');
        renderCalendar();
        showEvents(dateStr);
      }

      // ── Data Loading ───────────────────────────────────
      async function loadEvents() {
        try {
          const response = await fetch(`${API_URL}/events`);
          const apiEvents = await response.json();

          events = {};
          apiEvents
            .filter(event => (event.kind || 'event') === 'event' && event.date)
            .forEach(event => {
              const date = event.date.substring(0, 10);
              const eventTime = new Date(event.date).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
              if (!events[date]) events[date] = [];
              const eventCategory = getEventCategory(event);
              events[date].push({
                id: event.id,
                title: event.title,
                type: eventCategory || 'Event',
                time: eventTime,
                end_time: event.end_time ? event.end_time.slice(0, 5) : null,
                description: event.description,
                location: event.location,
                image_url: event.image_url || null,
                category: eventCategory
              });
            });

          renderCalendar();
          displayNextEvent();

          // Restore view from URL param (e.g. coming back from event detail)
          const urlView = new URLSearchParams(location.search).get('view');
          if (urlView === 'list') {
            switchView('list');
          } else if (currentView === 'list') {
            renderListView();
          }
        } catch (error) {
          console.error('Error loading events:', error);
          document.getElementById('eventsSection').innerHTML = '<h3>Error loading events</h3>';
        }
      }

      async function loadVideos() {
        try {
          const res = await fetch(`${API_URL}/videos`);
          if (res.ok) allVideosData = await res.json();
        } catch (_) {}
      }

      async function loadPhotos() {
        try {
          const res = await fetch(`${API_URL}/photos`);
          if (res.ok) allPhotosData = await res.json();
        } catch (_) {}
      }

      // ── Modal (legacy fallback) ────────────────────────
      function openEventModal(eventObj) {
        const modal = document.getElementById('eventDetailModal');
        document.getElementById('eventModalTitle').textContent = eventObj.title;
        const tagEl = document.getElementById('eventModalCategory');
        tagEl.textContent = eventObj.category || eventObj.type || 'Event';
        const dateEl = document.getElementById('eventModalDate');
        if (eventObj.displayDate || eventObj.date) {
          const displayDate = eventObj.displayDate || (() => {
            const [y,m,d] = eventObj.date.split('-');
            return new Date(y, m-1, d).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
          })();
          const timeStr = eventObj.time ? ` · ${eventObj.time}${eventObj.end_time ? ' – ' + eventObj.end_time : ''}` : '';
          dateEl.innerHTML = `📅 ${displayDate}${timeStr}`;
          dateEl.style.display = 'block';
        } else { dateEl.style.display = 'none'; }
        const locEl = document.getElementById('eventModalLocation');
        if (eventObj.location) { locEl.innerHTML = `📍 ${eventObj.location}`; locEl.style.display = 'block'; }
        else { locEl.style.display = 'none'; }
        const descEl = document.getElementById('eventModalDesc');
        if (eventObj.description) { descEl.innerHTML = eventObj.description.replace(/\n/g, '<br>'); descEl.style.display = 'block'; }
        else { descEl.style.display = 'none'; }
        const posterWrap = document.getElementById('eventModalPosterWrap');
        const posterImg = document.getElementById('eventModalPoster');
        if (eventObj.image_url) { posterImg.src = eventObj.image_url; posterWrap.style.display = 'block'; }
        else { posterWrap.style.display = 'none'; }
        document.getElementById('eventModalPhotosLink').style.display = 'none';
        document.getElementById('eventModalVideosLink').style.display = 'none';
        document.getElementById('eventModalVideos').style.display = 'none';
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }

      function closeEventModal(e) {
        if (e && e.target !== document.getElementById('eventDetailModal')) return;
        document.getElementById('eventDetailModal').style.display = 'none';
        document.body.style.overflow = '';
      }

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          document.getElementById('eventDetailModal').style.display = 'none';
          document.body.style.overflow = '';
        }
      });

      // ── Nav buttons ────────────────────────────────────
      document.getElementById('prevBtn').addEventListener('click', function() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
        document.getElementById('eventsSection').style.display = 'none';
      });

      document.getElementById('nextBtn').addEventListener('click', function() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
        document.getElementById('eventsSection').style.display = 'none';
      });

      // ── Init ───────────────────────────────────────────
      updateNavLoginState();
      renderCalendar();
      loadEvents();
      // Hide logo placeholder if image not found
      const logoImg = document.getElementById('calLogoImg');
      if (logoImg) logoImg.onerror = () => logoImg.style.display = 'none';
      loadVideos();
      loadPhotos();
    </script>
  </body>
</html>
