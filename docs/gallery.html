<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Pixipi</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- Navigation -->
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="videos.html">Videos</a>
      <a href="contact.html">Contact</a>
      <a id="loginNavBtn" href="portal.html">🔑 Log In</a>
    </nav>

    <!-- Gallery Section -->
    <div class="gallery-container">
      <h1>Gallery</h1>

      <div class="filter-section">
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
          <label style="color: #777; width: 100%; font-size: 14px;">Filter by Member:</label>
          <button class="filter-btn active" onclick="filterByMember('')">All Members</button>
          <button class="filter-btn" onclick="filterByMember('Buzzly')">Buzzly</button>
          <button class="filter-btn" onclick="filterByMember('Kokona')">Kokona</button>
          <button class="filter-btn" onclick="filterByMember('Shani')">Shani</button>
          <button class="filter-btn" onclick="filterByMember('Tokiyo')" style="display:none">Tokiyo</button>
          <button class="filter-btn" onclick="filterByMember('Group')">Group</button>
        </div>
      </div>

      <div id="folderContainer" class="gallery-folder-grid"></div>

      <div id="albumView" style="display: none; margin-top: 16px;">

        <!-- Album header panel -->
        <div class="album-header-panel">
          <div class="album-header-titlebar">
            <span class="album-header-icon">🖼</span>
            <span id="albumTitle" class="album-header-title"></span>
            <button id="backToFoldersBtn" class="album-header-back">← Albums</button>
          </div>
          <div class="album-header-body" id="eventDetailBanner" style="display:none;">
            <div id="eventDetailPosterWrap" class="album-header-poster">
              <img id="eventDetailPoster" src="" alt="Event Poster">
            </div>
            <div class="album-header-info">
              <div id="eventDetailDate" class="album-header-row" style="display:none;"></div>
              <div id="eventDetailLocation" class="album-header-row" style="display:none;"></div>
              <div id="eventDetailDesc" class="album-header-row album-header-desc" style="display:none;"></div>
              <div id="eventDetailVideos" class="event-video-links" style="display:none;"></div>
            </div>
          </div>
          <div class="album-header-footer">
            <span id="albumMeta" class="album-header-meta"></span>
          </div>
        </div>

        <div id="albumGrid" class="gallery-grid"></div>
      </div>

    </div><!-- /.gallery-container -->

    <footer>
      Follow Pixipi on
      <a href="https://www.instagram.com/pixipi_exe?igsh=MWR5ZDhnNTRvdjA4ZQ==" target="_blank" rel="noopener noreferrer">Instagram</a>
      <span>·</span>
      <a href="https://xhslink.com/m/AtFuH3oz3Lz" target="_blank" rel="noopener noreferrer">RedNote</a>
      <span>·</span>
      <a href="https://youtube.com/@ksm_doll_trap?si=y9Q1hdPEBzB3alXG" target="_blank" rel="noopener noreferrer">YouTube</a>
    </footer>

    <!-- Image Zoom Modal -->
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
      <button id="modalPrevBtn" class="image-modal-nav image-modal-prev" type="button" aria-label="Previous image">‹</button>
      <div class="modal-win98-window" onclick="event.stopPropagation()">
        <div class="modal-win98-titlebar">
          <span class="modal-win98-icon">🖼</span>
          <span class="modal-win98-title">Photo Viewer</span>
          <div class="modal-win98-btns">
            <div class="modal-win98-btn close">✕</div>
          </div>
        </div>
        <div class="modal-win98-body">
          <img id="modalImage" src="" alt="Zoomed Image">
        </div>
        <div class="modal-win98-statusbar">
          <span id="modalCounter"></span>
        </div>
      </div>
      <button id="modalNextBtn" class="image-modal-nav image-modal-next" type="button" aria-label="Next image">›</button>
    </div>

    <script>
      const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? 'https://api.cocolee-k2.workers.dev/api'
        : 'https://api.cocolee-k2.workers.dev/api';
      const API_ORIGIN = API_URL.replace('/api', '');
      const authToken = localStorage.getItem('authToken');
      let memberToken = localStorage.getItem('memberToken');
      let savedPhotoIds = new Set();
      let currentModalPhotos = [];
      let currentModalIndex = 0;

      function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
      }
      function updateNavLoginState() {
        const btn = document.getElementById('loginNavBtn');
        if (!btn) return;
        const adminTok = localStorage.getItem('authToken');
        const memberTok = localStorage.getItem('memberToken');
        if (adminTok) {
          const p = parseJwt(adminTok);
          btn.textContent = '⚙️ ' + (p?.username || 'Admin');
          btn.href = 'admin.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else if (memberTok) {
          const p = parseJwt(memberTok);
          btn.textContent = '🎀 ' + (p?.display_name || 'Portal');
          btn.href = 'portal.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else {
          btn.textContent = '🔑 Log In';
          btn.href = 'portal.html';
          btn.style.background = '';
        }
      }

      let allPhotos = [];
      let allEvents = [];
      let allVideos = [];
      let currentMemberFilter = '';

      function getYouTubeId(url) {
        const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
        return m ? m[1] : null;
      }

      function getVideoThumbnail(v) {
        if (v.thumbnail_url) return v.thumbnail_url;
        const ytId = getYouTubeId(v.url);
        return ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : null;
      }

      function getEventKind(event) {
        return event.kind || (event.date ? 'event' : 'album');
      }

      function getCollectionTypeLabel(event) {
        return getEventKind(event) === 'album' ? 'Album' : 'Event';
      }

      function resolvePhotoUrl(photo) {
        return photo.photo_url.startsWith('http') ? photo.photo_url : `${API_ORIGIN}${photo.photo_url}`;
      }
      function thumbUrl(url, width = 600) {
        if (!url || !url.includes('/storage/v1/object/public/')) return url;
        return url.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/') + `?width=${width}&quality=75`;
      }
      function imgWithFallback(thumb, original, alt = '', extra = '') {
        return `<img src="${thumb}" alt="${alt}" ${extra} onerror="this.onerror=null;this.src='${original}'" loading="lazy">`;
      }

      function getAlbumCover(event, photos) {
        if (photos.length > 0) {
          return resolvePhotoUrl(photos[0]);
        }

        if (event.image_url) {
          return event.image_url.startsWith('http') ? event.image_url : `${API_ORIGIN}${event.image_url}`;
        }

        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#1e3a8a"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
            <rect width="800" height="600" fill="url(#bg)"/>
            <text x="400" y="285" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="38" font-weight="bold">${event.title || 'Album'}</text>
            <text x="400" y="335" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Arial, sans-serif" font-size="24">No photos yet</text>
          </svg>
        `)}`;
      }

      function showModalPhoto(index) {
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');

        if (!currentModalPhotos.length) {
          return;
        }

        currentModalIndex = (index + currentModalPhotos.length) % currentModalPhotos.length;
        modalImg.src = currentModalPhotos[currentModalIndex];
        const counter = document.getElementById('modalCounter');
        if (counter) counter.textContent = `${currentModalIndex + 1} / ${currentModalPhotos.length}`;
        modal.style.display = 'flex';
      }

      function openImageModal(index) {
        showModalPhoto(index);
      }

      function closeImageModal() {
        document.getElementById('imageModal').style.display = 'none';
      }

      function goToPreviousModalPhoto() {
        showModalPhoto(currentModalIndex - 1);
      }

      function goToNextModalPhoto() {
        showModalPhoto(currentModalIndex + 1);
      }

      function setupImageModal() {
        const modal = document.getElementById('imageModal');
        const closeBtn = document.querySelector('.close');
        const prevBtn = document.getElementById('modalPrevBtn');
        const nextBtn = document.getElementById('modalNextBtn');

        if (modal.dataset.initialized === 'true') {
          return;
        }

        modal.dataset.initialized = 'true';

        closeBtn.addEventListener('click', closeImageModal);

        prevBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          goToPreviousModalPhoto();
        });

        nextBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          goToNextModalPhoto();
        });

        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            closeImageModal();
          }
        });

        document.addEventListener('keydown', (e) => {
          if (modal.style.display !== 'block') {
            return;
          }

          if (e.key === 'Escape') {
            closeImageModal();
          } else if (e.key === 'ArrowLeft') {
            goToPreviousModalPhoto();
          } else if (e.key === 'ArrowRight') {
            goToNextModalPhoto();
          }
        });
      }

      function filterByMember(member) {
        currentMemberFilter = member;
        
        // Update button styles
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        renderFolderCards();
      }

      function renderFolderCards() {
        const folderContainer = document.getElementById('folderContainer');
        const albumView = document.getElementById('albumView');
        albumView.style.display = 'none';
        folderContainer.className = 'gallery-folder-grid';
        folderContainer.style.display = '';

        // Apply member filter
        const filteredPhotos = currentMemberFilter 
          ? allPhotos.filter(p => p.member_tag === currentMemberFilter)
          : allPhotos;

        const collections = allEvents
          .map(event => {
            const photos = filteredPhotos.filter(p => String(p.event_id) === String(event.id));

            if (photos.length === 0) {
              return null;
            }

            const typeLabel = getCollectionTypeLabel(event);
            const subtitle = event.event_category || typeLabel;

            return {
              key: `event-${event.id}`,
              title: event.title,
              subtitle,
              typeLabel,
              count: photos.length,
              cover: getAlbumCover(event, photos)
            };
          })
          .filter(Boolean);

        const unassignedPhotos = filteredPhotos.filter(photo => !photo.event_id);
        if (unassignedPhotos.length > 0) {
          collections.push({
            key: 'unassigned',
            title: 'Other Photos',
            subtitle: 'Unassigned',
            typeLabel: 'Collection',
            count: unassignedPhotos.length,
            cover: resolvePhotoUrl(unassignedPhotos[0])
          });
        }

        const folders = collections;

        if (folders.length === 0) {
          folderContainer.innerHTML = '<p style="color:#999; grid-column:1/-1; text-align:center;">No albums yet</p>';
          return;
        }

        folderContainer.innerHTML = folders.map(folder => `
          <div class="gallery-item gallery-folder-item" style="cursor:pointer;" onclick="openAlbum('${folder.key}')">
            ${imgWithFallback(thumbUrl(folder.cover, 400), folder.cover, folder.title, `title="${folder.title}"`)}
            <p class="photo-member">${folder.title}</p>
          </div>
        `).join('');
      }

      function openAlbum(key) {
        const folderContainer = document.getElementById('folderContainer');
        const albumView = document.getElementById('albumView');
        const albumTitle = document.getElementById('albumTitle');
        const albumMeta = document.getElementById('albumMeta');
        const albumGrid = document.getElementById('albumGrid');
        const eventDetailBanner = document.getElementById('eventDetailBanner');
        const posterWrap = document.getElementById('eventDetailPosterWrap');
        const posterImg = document.getElementById('eventDetailPoster');
        const dateEl = document.getElementById('eventDetailDate');
        const locationEl = document.getElementById('eventDetailLocation');
        const descEl = document.getElementById('eventDetailDesc');

        // Apply member filter
        const filteredPhotos = currentMemberFilter 
          ? allPhotos.filter(p => p.member_tag === currentMemberFilter)
          : allPhotos;

        let title = '';
        let meta = '';
        let photos = [];

        if (key.startsWith('event-')) {
          const eventId = key.replace('event-', '');
          const eventObj = allEvents.find(e => String(e.id) === eventId);
          photos = filteredPhotos.filter(p => String(p.event_id) === eventId);
          title = eventObj?.title || 'Album';
          meta = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;

          if (eventObj) {
            // Date & time
            if (eventObj.date) {
              const d = new Date(eventObj.date);
              const dateStr = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
              const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
              const endStr = eventObj.end_time ? ` – ${eventObj.end_time.slice(0,5)}` : '';
              dateEl.innerHTML = `📅 <strong>${dateStr}</strong> · ${timeStr}${endStr}`;
              dateEl.style.display = 'block';
            } else {
              dateEl.style.display = 'none';
            }

            // Location
            if (eventObj.location) {
              locationEl.innerHTML = `📍 ${eventObj.location}`;
              locationEl.style.display = 'block';
            } else {
              locationEl.style.display = 'none';
            }

            // Description
            if (eventObj.description) {
              descEl.innerHTML = eventObj.description;
              descEl.style.display = 'block';
            } else {
              descEl.style.display = 'none';
            }

            // Poster
            if (eventObj.image_url) {
              const posterUrl = eventObj.image_url.startsWith('http') ? eventObj.image_url : `${API_ORIGIN}${eventObj.image_url}`;
              posterImg.src = posterUrl;
              posterWrap.style.display = 'block';
            } else {
              posterWrap.style.display = 'none';
            }

            // Related videos
            const videosEl = document.getElementById('eventDetailVideos');
            const relatedVideos = allVideos.filter(v => String(v.event_id) === String(eventObj.id));
            if (relatedVideos.length > 0) {
              videosEl.style.display = 'flex';
              videosEl.innerHTML = `<p style="margin:0 0 6px;font-size:13px;font-weight:700;color:#5b5f7a;">🎬 Videos</p>` +
                relatedVideos.map(v => {
                  const thumb = getVideoThumbnail(v);
                  const thumbHtml = thumb
                    ? `<img src="${thumb}" alt="${v.title}" class="event-video-link-thumb">`
                    : `<div class="event-video-link-icon">🎬</div>`;
                  return `<a class="event-video-link-item" href="${v.url}" target="_blank" rel="noopener noreferrer">
                    ${thumbHtml}
                    <span class="event-video-link-title">${v.title}</span>
                    <span class="event-video-link-arrow">↗</span>
                  </a>`;
                }).join('');
            } else {
              videosEl.style.display = 'none';
            }

            const hasDetails = eventObj.date || eventObj.location || eventObj.description || eventObj.image_url || relatedVideos.length > 0;
            eventDetailBanner.style.display = hasDetails ? 'flex' : 'none';
          } else {
            eventDetailBanner.style.display = 'none';
          }
        } else if (key === 'unassigned') {
          photos = filteredPhotos.filter(photo => !photo.event_id);
          title = 'Other Photos';
          meta = `Collection · ${photos.length} photos`;
          eventDetailBanner.style.display = 'none';
        }

        albumTitle.textContent = title;
        // Event details link — place in footer
        const existingLink = document.getElementById('albumEventLink');
        if (existingLink) existingLink.remove();
        const footer = document.querySelector('.album-header-footer');
        if (key.startsWith('event-')) {
          const eventId = key.replace('event-', '');
          const eventObj = allEvents.find(e => String(e.id) === eventId);
          if (eventObj && (eventObj.kind || 'event') === 'event' && footer) {
            const link = document.createElement('a');
            link.id = 'albumEventLink';
            link.href = `event.html?id=${eventId}`;
            link.textContent = 'View Event Details →';
            link.className = 'album-event-link';
            footer.prepend(link);
          }
        }
        const metaEl = document.getElementById('albumMeta');
        if (metaEl) metaEl.textContent = meta;
        currentModalPhotos = photos.map(photo => resolvePhotoUrl(photo));
        currentModalIndex = 0;

        albumGrid.innerHTML = photos.map((photo, index) => {
          const url = resolvePhotoUrl(photo);
          const isSaved = savedPhotoIds.has(photo.id);
          return `
            <div class="gallery-item">
              ${imgWithFallback(thumbUrl(url), url, photo.caption || 'Photo', `title="${photo.caption || ''}" onclick="openImageModal(${index})"`)}

              <button class="photo-heart-btn${isSaved ? ' saved' : ''}" data-photo-id="${photo.id}" onclick="toggleSavePhoto(${photo.id}, event)">${isSaved ? '\u2665' : '\u2661'}</button>
            </div>
          `;
        }).join('');

        folderContainer.style.display = 'none';
        albumView.style.display = 'block';
        setupImageModal();
        // Load member saved photo statuses
        const photoIds = photos.map(p => p.id);
        loadMemberPhotoStatus(photoIds);
      }

      document.getElementById('backToFoldersBtn').addEventListener('click', () => {
        document.getElementById('albumView').style.display = 'none';
        document.getElementById('folderContainer').style.display = 'grid';
      });

      async function loadGallery() {
        try {
          const [photosResponse, eventsResponse, videosResponse] = await Promise.all([
            fetch(`${API_URL}/photos`),
            fetch(`${API_URL}/events`),
            fetch(`${API_URL}/videos`)
          ]);

          allPhotos = await photosResponse.json();
          allEvents = await eventsResponse.json();
          if (videosResponse.ok) allVideos = await videosResponse.json();

          renderFolderCards();
          setupImageModal();

          // Auto-open album from URL hash (e.g., gallery.html#event-24)
          const hashKey = window.location.hash.replace('#', '');
          if (hashKey.startsWith('event-') || hashKey === 'unassigned') {
            openAlbum(hashKey);
          }
        } catch (error) {
          console.error('Error loading gallery:', error);
          document.getElementById('folderContainer').innerHTML = '<p style="color: #999;">Error loading albums</p>';
        }
      }

      updateNavLoginState();
      loadGallery();

      // ── Member: save / unsave photos ───────────
      async function loadMemberPhotoStatus(photoIds) {
        if (!memberToken || photoIds.length === 0) return;
        try {
          const res = await fetch(`${API_URL}/members/my-status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${memberToken}` },
            body: JSON.stringify({ event_ids: [], photo_ids: photoIds })
          });
          if (!res.ok) return;
          const data = await res.json();
          savedPhotoIds = new Set((data.saved_photos || []).map(Number));
          // Update any visible heart buttons
          document.querySelectorAll('.photo-heart-btn').forEach(btn => {
            const pid = Number(btn.dataset.photoId);
            const isSaved = savedPhotoIds.has(pid);
            btn.textContent = isSaved ? '\u2665' : '\u2661';
            btn.classList.toggle('saved', isSaved);
          });
        } catch (_) {}
      }

      function showLoginToast() {
        let t = document.getElementById('loginToast');
        if (!t) {
          t = document.createElement('div');
          t.id = 'loginToast';
          t.className = 'login-toast';
          t.innerHTML = '<span>Sign in to save photos</span><a href="portal.html">Log In →</a>';
          document.body.appendChild(t);
        }
        t.classList.add('show');
        clearTimeout(t._hide);
        t._hide = setTimeout(() => t.classList.remove('show'), 3000);
      }

      async function toggleSavePhoto(photoId, e) {
        e.stopPropagation();
        if (!memberToken) { showLoginToast(); return; }
        const isSaved = savedPhotoIds.has(photoId);
        const method = isSaved ? 'DELETE' : 'POST';
        try {
          const res = await fetch(`${API_URL}/members/saves/photos/${photoId}`, {
            method,
            headers: { 'Authorization': `Bearer ${memberToken}` }
          });
          if (!res.ok) return;
          if (isSaved) savedPhotoIds.delete(photoId);
          else savedPhotoIds.add(photoId);
          const btn = document.querySelector(`.photo-heart-btn[data-photo-id="${photoId}"]`);
          if (btn) {
            btn.textContent = savedPhotoIds.has(photoId) ? '\u2665' : '\u2661';
            btn.classList.toggle('saved', savedPhotoIds.has(photoId));
          }
        } catch (err) { console.error(err); }
      }
    </script>
  </body>
</html>
