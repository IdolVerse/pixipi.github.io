<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event - Pixipi</title>
    <link rel="stylesheet" href="style.css">
    <style>
      /* Event Page — Win98 Dreamcore */
      .ep-wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 12px 24px 64px;
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 32px;
        align-items: start;
        position: relative;
        z-index: 1;
      }

      /* ── Left: poster ── */
      .ep-poster { position: sticky; top: 20px; }

      .ep-poster img {
        width: 100%;
        display: block;
        border-top:    3px solid var(--w-light);
        border-left:   3px solid var(--w-light);
        border-right:  3px solid var(--w-dark);
        border-bottom: 3px solid var(--w-dark);
      }

      .ep-poster-carousel {
        position: relative;
        overflow: hidden;
        border-top:    3px solid var(--w-light);
        border-left:   3px solid var(--w-light);
        border-right:  3px solid var(--w-dark);
        border-bottom: 3px solid var(--w-dark);
        touch-action: pan-y;
      }
      .ep-poster-track { display: flex; transition: transform 0.25s; will-change: transform; }
      .ep-poster-track img { width: 100%; flex-shrink: 0; display: block; object-fit: cover; }

      .ep-poster-dots { display: flex; justify-content: center; gap: 6px; margin-top: 8px; }
      .ep-poster-dot {
        width: 8px; height: 8px;
        background: var(--lav-3);
        border-top: 1px solid var(--w-dark); border-left: 1px solid var(--w-dark);
        border-right: 1px solid var(--w-light); border-bottom: 1px solid var(--w-light);
        cursor: pointer; border: none; padding: 0;
      }
      .ep-poster-dot.active { background: var(--pink-d); }

      .ep-poster-arrow {
        position: absolute; top: 50%; transform: translateY(-50%);
        width: 28px; height: 28px;
        background: var(--lav-2);
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
        color: var(--text); font-family: var(--pixel); font-size: 10px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.15s; z-index: 2; padding: 0;
      }
      .ep-poster-arrow.prev { left: 6px; }
      .ep-poster-arrow.next { right: 6px; }
      .ep-poster-carousel:hover .ep-poster-arrow { opacity: 1; }
      .ep-poster-arrow:disabled { opacity: 0 !important; cursor: default; }

      .ep-poster-placeholder {
        width: 100%; aspect-ratio: 3/4;
        background: var(--lav-3);
        display: flex; align-items: center; justify-content: center;
        font-size: 64px;
        border-top:    3px solid var(--w-light);
        border-left:   3px solid var(--w-light);
        border-right:  3px solid var(--w-dark);
        border-bottom: 3px solid var(--w-dark);
      }

      /* ── Right: detail panel (Win98 window) ── */
      .ep-details {
        min-width: 0;
        background: var(--lav-2);
        border-top:    3px solid var(--w-light);
        border-left:   3px solid var(--w-light);
        border-right:  3px solid var(--w-dark);
        border-bottom: 3px solid var(--w-dark);
        box-shadow: 2px 2px 0 var(--w-black);
        overflow: hidden;
      }

      /* details titlebar */
      .ep-details::before {
        content: '🎀 Event Details';
        display: block;
        background: linear-gradient(90deg, var(--tb-from), var(--tb-to));
        font-family: var(--pixel);
        font-size: 11px;
        color: #fff;
        padding: 8px 12px;
        text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
      }

      .ep-details { padding: 0 0 24px; }
      .ep-details > * { padding-left: 20px; padding-right: 20px; }
      .ep-details > .ep-back { margin-top: 10px; }
      .ep-details::before { padding-left: 12px; padding-right: 12px; }

      /* shared label style — Back to Calendar, Convention, About This Event, My Activity */
      .ep-back,
      .ep-category,
      .ep-section-title {
        display: inline-block;
        font-family: var(--pixel); font-size: 11px;
        color: var(--text);
        background: var(--lav-3);
        padding: 5px 20px;
        border-top: 1px solid var(--w-light); border-left: 1px solid var(--w-light);
        border-right: 1px solid var(--w-dark); border-bottom: 1px solid var(--w-dark);
        margin-bottom: 10px;
        text-decoration: none;
      }
      /* section titles sit inside padded wrapper divs — pull them flush to the panel edge */
      .ep-section-title {
        display: block; width: fit-content;
        margin-left: -20px;
      }
      /* back button sits at top level — just needs width-to-content */
      .ep-back {
        display: block; width: fit-content;
      }
      /* only the back button is interactive */
      .ep-back { color: var(--text-2); }
      .ep-back:hover { background: var(--lav-2); }

      .ep-title {
        font-family: var(--pixel); font-weight: 400;
        font-size: clamp(13px, 2vw, 18px);
        color: var(--text); margin: 0 0 10px; line-height: 1.7;
      }

      .ep-meta-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }

      .ep-meta-item {
        display: flex; align-items: flex-start; gap: 8px;
        font-size: 13px; color: var(--text-2);
      }
      .ep-meta-icon { flex-shrink: 0; width: 18px; text-align: center; }
      .ep-meta-link { color: var(--lav-5); text-decoration: none; }
      .ep-meta-link:hover { text-decoration: underline; }

      .ep-actions {
        display: flex; flex-wrap: wrap; gap: 6px;
        margin-bottom: 2px;
      }
      .ep-action-btn {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 6px 11px;
        font-family: var(--pixel); font-size: 9px;
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
        text-decoration: none; cursor: pointer; background: var(--lav-3); color: var(--text);
        transition: filter 0.1s;
      }
      .ep-action-btn.primary {
        background: linear-gradient(90deg, var(--tb-from), var(--tb-to));
        color: #fff; text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
      }
      .ep-action-btn:hover { filter: brightness(1.07); }

      .ep-divider {
        height: 2px;
        background: var(--lav-3);
        margin: 12px 0;
        border-top: 1px solid var(--w-dark);
        border-bottom: 1px solid var(--w-light);
      }


      .ep-desc {
        font-size: 15px; line-height: 1.8;
        color: var(--text-2); white-space: pre-line; margin: 0;
      }

      /* ── Member actions ── */
      .ep-member-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .ep-member-btn {
        flex: 1; min-width: 120px;
        padding: 10px 14px; font-family: var(--pixel); font-size: 10px;
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
        background: var(--lav-2); color: var(--text); cursor: pointer;
      }
      .ep-member-btn:hover { background: var(--lav-3); }
      .ep-member-btn.active {
        background: linear-gradient(90deg, var(--tb-from), var(--tb-to));
        color: #fff;
        border-top: 2px solid var(--w-dark); border-left: 2px solid var(--w-dark);
        border-right: 2px solid var(--w-light); border-bottom: 2px solid var(--w-light);
      }

      .ep-signin-prompt {
        padding: 12px 16px;
        background: var(--lav-1);
        border-top: 2px solid var(--w-dark); border-left: 2px solid var(--w-dark);
        border-right: 2px solid var(--w-light); border-bottom: 2px solid var(--w-light);
        font-size: 14px; color: var(--text-2); text-align: center; margin-top: 8px;
      }
      .ep-signin-prompt a { color: var(--lav-5); text-decoration: none; font-weight: 700; }

      .login-toast {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        background: var(--lav-6); color: #fff; padding: 12px 20px;
        font-family: var(--pixel); font-size: 10px;
        z-index: 9999;
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
        display: flex; align-items: center; gap: 12px; white-space: nowrap;
        opacity: 0; pointer-events: none; transition: opacity 0.2s;
      }
      .login-toast.show { opacity: 1; pointer-events: auto; }
      .login-toast a { color: var(--pink); font-weight: 700; text-decoration: none; }

      /* ── Photos ── */
      .ep-photos-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 6px;
      }
      .ep-photo-item {
        aspect-ratio: 1; overflow: hidden; cursor: pointer;
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
      }
      .ep-photo-item img {
        width: 100%; height: 100%; object-fit: cover; display: block;
        transition: transform 0.2s;
      }
      .ep-photo-item:hover img { transform: scale(1.05); }

      /* ── Videos ── */
      .ep-video-item {
        display: flex; gap: 12px; align-items: center;
        padding: 10px; margin-bottom: 6px;
        background: var(--lav-1); text-decoration: none; color: var(--text);
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
        transition: filter 0.1s;
      }
      .ep-video-item:hover { filter: brightness(1.04); }
      .ep-video-thumb { width: 96px; height: 56px; object-fit: cover; flex-shrink: 0; }
      .ep-video-no-thumb {
        width: 96px; height: 56px; flex-shrink: 0;
        background: var(--lav-3); display: flex; align-items: center;
        justify-content: center; font-size: 22px;
      }
      .ep-video-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* ── Lightbox ── */
      .ep-lightbox {
        display: none; position: fixed; inset: 0;
        background: rgba(61,36,102,0.9); z-index: 9000;
        align-items: center; justify-content: center; padding: 20px; cursor: zoom-out;
      }
      .ep-lightbox.open { display: flex; }
      .ep-lightbox img {
        max-width: 100%; max-height: 90vh; cursor: default;
        border-top: 3px solid var(--w-light); border-left: 3px solid var(--w-light);
        border-right: 3px solid var(--w-dark); border-bottom: 3px solid var(--w-dark);
      }
      .ep-lightbox-close {
        position: absolute; top: 16px; right: 20px;
        color: #fff; font-size: 28px; cursor: pointer;
        background: var(--lav-2); border: none; opacity: 0.85; line-height: 1;
        width: 32px; height: 28px; display: flex; align-items: center; justify-content: center;
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
      }
      .ep-lightbox-close:hover { opacity: 1; }

      /* ── Prev / Next nav ── */
      .ep-evt-nav { display: flex; align-items: stretch; gap: 6px; margin-top: 10px; }
      .ep-evt-nav-btn {
        flex: 1; display: flex; flex-direction: row; align-items: center; gap: 6px;
        padding: 6px 10px;
        background: var(--lav-2); text-decoration: none; color: var(--text);
        border-top: 2px solid var(--w-light); border-left: 2px solid var(--w-light);
        border-right: 2px solid var(--w-dark); border-bottom: 2px solid var(--w-dark);
        min-width: 0; transition: filter 0.1s;
      }
      .ep-evt-nav-btn:hover { filter: brightness(1.04); }
      .ep-evt-nav-btn.next { flex-direction: row-reverse; }
      .ep-evt-nav-label {
        font-family: var(--pixel); font-size: 8px; color: var(--pink-d);
        flex-shrink: 0;
      }
      .ep-evt-nav-title {
        font-family: var(--pixel); font-size: 8px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        color: var(--text-2); min-width: 0;
      }
      .ep-evt-nav-date { display: none; }

      /* ── Loading ── */
      .ep-loading {
        text-align: center; padding: 80px 20px;
        color: var(--text-2); font-family: var(--pixel); font-size: 12px;
        position: relative; z-index: 1;
      }

      /* ── Mobile ── */
      @media (max-width: 700px) {
        .ep-wrap { grid-template-columns: 1fr; gap: 20px; padding: 20px 16px 60px; }
        .ep-poster { position: static; }
        .ep-poster-placeholder { max-height: 320px; }
      }
    </style>
  </head>

  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="members.html">Members</a>
      <a href="calendar.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="videos.html">Videos</a>
      <a href="contact.html">Contact</a>
      <a id="loginNavBtn" href="portal.html">🔑 Log In</a>
    </nav>

    <div id="epLoading" class="ep-loading">Loading event…</div>

    <div class="ep-wrap" id="epWrap" style="display:none;">
      <!-- Left: poster -->
      <div class="ep-poster" id="epPosterCol">
        <div class="ep-poster-placeholder" id="epPosterPlaceholder">🎀</div>
        <img id="epPosterImg" src="" alt="" style="display:none;">
      </div>

      <!-- Right: details -->
      <div class="ep-details">
        <a href="calendar.html" class="ep-back" id="epBackBtn">← Back to Calendar</a>

        <!-- Prev / Next navigation -->
        <div id="epEvtNav"></div>

        <div class="ep-divider"></div>

        <div id="epCategory" class="ep-category" style="display:none;"></div>
        <h1 id="epTitle" class="ep-title"></h1>

        <div id="epMetaList" class="ep-meta-list"></div>
        <div id="epActions" class="ep-actions"></div>

        <!-- Description -->
        <div id="epDescSection" style="display:none;">
          <div class="ep-divider"></div>
          <div class="ep-section-title">About This Event</div>
          <p id="epDesc" class="ep-desc"></p>
        </div>

        <!-- Photos -->
        <div id="epPhotosSection" style="display:none;">
          <div class="ep-divider"></div>
          <div class="ep-section-title">📸 Photos</div>
          <div id="epPhotosGrid" class="ep-photos-grid"></div>
        </div>

        <!-- Videos -->
        <div id="epVideosSection" style="display:none;">
          <div class="ep-divider"></div>
          <div class="ep-section-title">🎬 Videos</div>
          <div id="epVideosList"></div>
        </div>

        <!-- Member actions -->
        <div class="ep-divider"></div>
        <div id="epMemberArea"></div>
      </div>
    </div>

    <!-- Lightbox -->
    <div class="ep-lightbox" id="epLightbox" onclick="closeLightbox()">
      <button class="ep-lightbox-close" onclick="closeLightbox()">&times;</button>
      <img id="epLightboxImg" src="" alt="" onclick="event.stopPropagation()">
    </div>

    <script>
      const API_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? 'https://api.cocolee-k2.workers.dev/api'
        : 'https://api.cocolee-k2.workers.dev/api';

      const memberToken = localStorage.getItem('memberToken');
      const adminToken  = localStorage.getItem('authToken');
      // ── Back link ──────────────────────────────────────────
      (function() {
        const params = new URLSearchParams(location.search);
        const from = params.get('from');
        const btn = document.getElementById('epBackBtn');
        if (btn && from === 'list') {
          btn.href = 'calendar.html?view=list';
          btn.textContent = '← Back to List';
        }
      })();

      let eventId = null;
      let eventDate = null;
      let currentEv = null;
      let memberEventStatus = { saved: false, checkedIn: false };

      function addToCalendar() {
        if (!currentEv) return;
        const d = new Date(currentEv.date);
        const pad = n => String(n).padStart(2, '0');
        const hasTime = d.getHours() !== 0 || d.getMinutes() !== 0;
        let dtStart, dtEnd;
        if (hasTime) {
          const fmt = dt => `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
          dtStart = fmt(d);
          const end = new Date(d); end.setHours(end.getHours() + 3);
          dtEnd = fmt(end);
        } else {
          const fmt = dt => `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}`;
          dtStart = fmt(d); dtEnd = fmt(d);
        }
        const lines = [
          'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Pixipi//Event//EN',
          'BEGIN:VEVENT',
          `DTSTART${hasTime ? '' : ';VALUE=DATE'}:${dtStart}`,
          `DTEND${hasTime ? '' : ';VALUE=DATE'}:${dtEnd}`,
          `SUMMARY:${currentEv.title}`,
          currentEv.location ? `LOCATION:${currentEv.location}` : '',
          currentEv.description ? `DESCRIPTION:${currentEv.description.replace(/[\r\n]+/g, '\\n').slice(0, 500)}` : '',
          currentEv.link ? `URL:${currentEv.link}` : '',
          'END:VEVENT', 'END:VCALENDAR'
        ].filter(Boolean).join('\r\n');
        const blob = new Blob([lines], { type: 'text/calendar' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${currentEv.title.replace(/[^a-z0-9]/gi, '_')}.ics`;
        a.click(); URL.revokeObjectURL(url);
      }

      function parseJwt(t) {
        try { return JSON.parse(atob(t.split('.')[1])); } catch { return null; }
      }
      function updateNavLoginState() {
        const btn = document.getElementById('loginNavBtn');
        if (!btn) return;
        if (adminToken) {
          const p = parseJwt(adminToken);
          btn.textContent = '⚙️ ' + (p?.username || 'Admin');
          btn.href = 'admin.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else if (memberToken) {
          const p = parseJwt(memberToken);
          btn.textContent = '🎀 ' + (p?.display_name || 'Portal');
          btn.href = 'portal.html';
          btn.style.background = 'linear-gradient(90deg, #9b7fd4, #c4a8e8)';
        } else {
          btn.textContent = '🔑 Log In';
          btn.href = 'portal.html';
          btn.style.background = '';
        }
      }

      function formatDate(dateStr) {
        if (!dateStr) return null;
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }
      function formatTime(dateStr) {
        if (!dateStr) return null;
        const d = new Date(dateStr);
        if (d.getHours() === 0 && d.getMinutes() === 0) return null;
        return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      }
      function thumbUrl(url, width = 600) {
        if (!url || !url.includes('/storage/v1/object/public/')) return url;
        return url.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/') + `?width=${width}&quality=75`;
      }
      function imgWithFallback(thumb, original, alt = '', cls = '', extra = '') {
        return `<img src="${thumb}" alt="${alt}" ${cls ? `class="${cls}"` : ''} ${extra} onerror="this.onerror=null;this.src='${original}'" loading="lazy">`;
      }

      function getYouTubeId(url) {
        const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?/\s]{11})/);
        return m ? m[1] : null;
      }
      function getVideoThumbnail(v) {
        if (v.thumbnail_url) return v.thumbnail_url;
        const id = getYouTubeId(v.url);
        return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
      }

      function openLightbox(src) {
        document.getElementById('epLightboxImg').src = src;
        document.getElementById('epLightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        document.getElementById('epLightbox').classList.remove('open');
        document.body.style.overflow = '';
      }
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

      // ── Member actions ─────────────────────────────────────────
      function renderMemberArea() {
        const area = document.getElementById('epMemberArea');
        if (!eventId) { area.innerHTML = ''; return; }
        area.innerHTML = `
          <div class="ep-section-title">My Activity</div>
          <div class="ep-member-actions">
            <button id="epBtnSave" class="ep-member-btn" onclick="toggleSave()">⭐ Save Event</button>
            <button id="epBtnCheckin" class="ep-member-btn" onclick="toggleCheckin()">📍 Check In</button>
          </div>`;
        if (memberToken) {
          updateMemberBtns();
          loadMemberStatus();
        }
      }
      function updateMemberBtns() {
        const s = document.getElementById('epBtnSave');
        const c = document.getElementById('epBtnCheckin');
        if (!s) return;
        s.classList.toggle('active', memberEventStatus.saved);
        s.textContent = memberEventStatus.saved ? '★ Saved' : '⭐ Save Event';
        const eventIsPast = eventDate && new Date(eventDate) <= new Date();
        c.classList.toggle('active', memberEventStatus.checkedIn);
        c.textContent = memberEventStatus.checkedIn ? '✓ Checked In' : '📍 Check In';
        c.disabled = !eventIsPast;
        c.title = eventIsPast ? '' : 'Check-in is only available after the event has taken place';
        c.style.opacity = eventIsPast ? '' : '0.45';
        c.style.cursor = eventIsPast ? '' : 'not-allowed';
      }
      async function loadMemberStatus() {
        try {
          const res = await fetch(`${API_URL}/members/my-status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${memberToken}` },
            body: JSON.stringify({ event_ids: [eventId] })
          });
          if (!res.ok) return;
          const data = await res.json();
          memberEventStatus.saved = data.savedEvents.includes(eventId);
          memberEventStatus.checkedIn = data.checkedEvents.includes(eventId);
          updateMemberBtns();
        } catch {}
      }
      function showLoginToast() {
        let t = document.getElementById('loginToast');
        if (!t) {
          t = document.createElement('div');
          t.id = 'loginToast';
          t.className = 'login-toast';
          t.innerHTML = '<span>Sign in to save events</span><a href="portal.html">Log In →</a>';
          document.body.appendChild(t);
        }
        t.classList.add('show');
        clearTimeout(t._hide);
        t._hide = setTimeout(() => t.classList.remove('show'), 3000);
      }

      async function toggleSave() {
        if (!memberToken) { showLoginToast(); return; }
        const was = memberEventStatus.saved;
        const res = await fetch(`${API_URL}/members/saves/events/${eventId}`, {
          method: was ? 'DELETE' : 'POST',
          headers: { 'Authorization': `Bearer ${memberToken}` }
        }).catch(() => null);
        if (res?.ok) { memberEventStatus.saved = !was; updateMemberBtns(); }
      }
      async function toggleCheckin() {
        if (!memberToken) { showLoginToast(); return; }
        if (!eventDate || new Date(eventDate) > new Date()) {
          alert('Check-in is only available after the event has taken place.');
          return;
        }
        const was = memberEventStatus.checkedIn;
        const res = await fetch(`${API_URL}/members/checkins/${eventId}`, {
          method: was ? 'DELETE' : 'POST',
          headers: { 'Authorization': `Bearer ${memberToken}` }
        }).catch(() => null);
        if (res?.ok) { memberEventStatus.checkedIn = !was; updateMemberBtns(); }
      }

      // ── Main loader ────────────────────────────────────────────
      async function loadEvent() {
        const params = new URLSearchParams(location.search);
        eventId = parseInt(params.get('id'));
        if (!eventId) {
          document.getElementById('epLoading').innerHTML =
            'Event not found. <a href="calendar.html">← Back to Calendar</a>';
          return;
        }

        try {
          const [evRes, photosRes, videosRes] = await Promise.all([
            fetch(`${API_URL}/events/${eventId}`),
            fetch(`${API_URL}/photos/event/${eventId}`),
            fetch(`${API_URL}/videos/event/${eventId}`)
          ]);
          if (!evRes.ok) throw new Error();
          const ev     = await evRes.json();
          const photos = photosRes.ok ? await photosRes.json() : [];
          const videos = videosRes.ok ? await videosRes.json() : [];
          render(ev, photos, videos);
        } catch {
          document.getElementById('epLoading').innerHTML =
            'Could not load event. <a href="calendar.html">← Back to Calendar</a>';
        }
      }

      function render(ev, photos, videos) {
        document.title = `${ev.title} – Pixipi`;

        // Poster(s)
        const posterUrls = (() => {
          try { if (ev.poster_urls) { const a = JSON.parse(ev.poster_urls); if (Array.isArray(a) && a.length) return a; } } catch {}
          return ev.image_url ? [ev.image_url] : [];
        })();

        if (posterUrls.length > 0) {
          const col = document.getElementById('epPosterCol');
          document.getElementById('epPosterPlaceholder').style.display = 'none';

          if (posterUrls.length === 1) {
            const img = document.getElementById('epPosterImg');
            img.src = posterUrls[0];
            img.alt = ev.title;
            img.style.display = 'block';
          } else {
            // Multi-poster swipe carousel
            document.getElementById('epPosterImg').remove();

            const carousel = document.createElement('div');
            carousel.className = 'ep-poster-carousel';

            const track = document.createElement('div');
            track.className = 'ep-poster-track';
            posterUrls.forEach(url => {
              const img = document.createElement('img');
              img.src = url;
              img.alt = ev.title;
              track.appendChild(img);
            });
            carousel.appendChild(track);

            const btnPrev = document.createElement('button');
            btnPrev.className = 'ep-poster-arrow prev';
            btnPrev.innerHTML = '&#8249;';
            btnPrev.setAttribute('aria-label', 'Previous poster');
            carousel.appendChild(btnPrev);

            const btnNext = document.createElement('button');
            btnNext.className = 'ep-poster-arrow next';
            btnNext.innerHTML = '&#8250;';
            btnNext.setAttribute('aria-label', 'Next poster');
            carousel.appendChild(btnNext);

            col.appendChild(carousel);

            // Dot indicators
            const dots = document.createElement('div');
            dots.className = 'ep-poster-dots';
            posterUrls.forEach((_, i) => {
              const dot = document.createElement('button');
              dot.className = 'ep-poster-dot' + (i === 0 ? ' active' : '');
              dot.onclick = () => goTo(i);
              dots.appendChild(dot);
            });
            col.appendChild(dots);

            let current = 0;
            function goTo(idx) {
              current = idx;
              track.style.transform = `translateX(-${idx * 100}%)`;
              dots.querySelectorAll('.ep-poster-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
              btnPrev.disabled = idx === 0;
              btnNext.disabled = idx === posterUrls.length - 1;
            }
            btnPrev.onclick = () => goTo(Math.max(0, current - 1));
            btnNext.onclick = () => goTo(Math.min(posterUrls.length - 1, current + 1));
            goTo(0);

            // Touch swipe
            let startX = 0;
            carousel.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
            carousel.addEventListener('touchend', e => {
              const dx = e.changedTouches[0].clientX - startX;
              if (Math.abs(dx) > 40) goTo(Math.max(0, Math.min(posterUrls.length - 1, current + (dx < 0 ? 1 : -1))));
            }, { passive: true });

            // Mouse drag
            let dragStartX = 0, dragging = false;
            carousel.addEventListener('mousedown', e => { dragStartX = e.clientX; dragging = true; });
            carousel.addEventListener('mouseup', e => {
              if (!dragging) return; dragging = false;
              const dx = e.clientX - dragStartX;
              if (Math.abs(dx) > 40) goTo(Math.max(0, Math.min(posterUrls.length - 1, current + (dx < 0 ? 1 : -1))));
            });
            carousel.addEventListener('mouseleave', () => { dragging = false; });
          }
        }

        // Category
        const category = ev.event_category || ev.category;
        if (category) {
          const el = document.getElementById('epCategory');
          el.textContent = category;
          el.style.display = 'inline-block';
        }

        // Title
        document.getElementById('epTitle').textContent = ev.title;

        // Meta
        const meta = [];
        const dateStr = formatDate(ev.date);
        const timeStr = formatTime(ev.date);
        if (dateStr) {
          let label = dateStr;
          if (timeStr) label += ` · ${timeStr}${ev.end_time ? ' – ' + ev.end_time : ''}`;
          meta.push(['📅', label]);
        }
        if (ev.location) {
          const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(ev.location)}`;
          meta.push(['📍', `<a class="ep-meta-link" href="${mapsUrl}" target="_blank" rel="noopener">${ev.location}</a>`]);
        }
        document.getElementById('epMetaList').innerHTML = meta.map(([icon, text]) => `
          <div class="ep-meta-item">
            <span class="ep-meta-icon">${icon}</span>
            <span>${text}</span>
          </div>`).join('');

        // Actions row: event link + add to calendar
        const actions = [];
        if (ev.link) {
          actions.push(`<a class="ep-action-btn primary" href="${ev.link}" target="_blank" rel="noopener noreferrer">🔗 Event Link →</a>`);
        }
        if (ev.date) {
          actions.push(`<button class="ep-action-btn" onclick="addToCalendar()">📅 Add to Calendar</button>`);
        }
        document.getElementById('epActions').innerHTML = actions.join('');

        // Description
        if (ev.description) {
          document.getElementById('epDesc').textContent = ev.description;
          document.getElementById('epDescSection').style.display = 'block';
        }

        // Member area
        eventDate = ev.date || null;
        currentEv = ev;
        renderMemberArea();

        // Photos
        if (photos.length > 0) {
          document.getElementById('epPhotosGrid').innerHTML = photos.map(p => `
            <div class="ep-photo-item" onclick="openLightbox('${p.photo_url}')">
              ${imgWithFallback(thumbUrl(p.photo_url), p.photo_url, p.caption || '')}
            </div>`).join('');
          document.getElementById('epPhotosSection').style.display = 'block';
        }

        // Videos
        if (videos.length > 0) {
          document.getElementById('epVideosList').innerHTML = videos.map(v => {
            const thumb = getVideoThumbnail(v);
            return `
              <a class="ep-video-item" href="${v.url}" target="_blank" rel="noopener noreferrer">
                ${thumb
                  ? `<img class="ep-video-thumb" src="${thumb}" alt="${v.title}">`
                  : `<div class="ep-video-no-thumb">🎬</div>`}
                <div style="flex:1;min-width:0;">
                  <div class="ep-video-title">${v.title}</div>
                  ${v.description ? `<div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">${v.description}</div>` : ''}
                </div>
                <span style="font-size:16px;color:var(--text-secondary);flex-shrink:0;">↗</span>
              </a>`;
          }).join('');
          document.getElementById('epVideosSection').style.display = 'block';
        }

        document.getElementById('epLoading').style.display = 'none';
        document.getElementById('epWrap').style.display = 'grid';

        // Load prev/next after render
        loadSiblingEvents();
      }

      // ── Prev / Next ────────────────────────────────────────────
      async function loadSiblingEvents() {
        try {
          const fromParam = new URLSearchParams(location.search).get('from') || '';
          const suffix = fromParam ? `&from=${fromParam}` : '';

          const res = await fetch(`${API_URL}/events`);
          if (!res.ok) return;
          const all = await res.json();

          // Only real events with a date, sorted oldest → newest
          const sorted = all
            .filter(e => (e.kind || 'event') === 'event' && e.date)
            .sort((a, b) => new Date(a.date) - new Date(b.date));

          const idx = sorted.findIndex(e => e.id === eventId);
          if (idx === -1) return;

          const prev = idx > 0 ? sorted[idx - 1] : null;
          const next = idx < sorted.length - 1 ? sorted[idx + 1] : null;
          if (!prev && !next) return;

          const fmtShort = d => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

          let html = '<div class="ep-evt-nav">';
          if (prev) {
            html += `<a class="ep-evt-nav-btn prev" href="event.html?id=${prev.id}${suffix}">
              <span class="ep-evt-nav-label">← Previous</span>
              <span class="ep-evt-nav-title">${prev.title}</span>
              <span class="ep-evt-nav-date">${fmtShort(prev.date)}</span>
            </a>`;
          } else {
            html += '<div style="flex:1"></div>';
          }
          if (next) {
            html += `<a class="ep-evt-nav-btn next" href="event.html?id=${next.id}${suffix}">
              <span class="ep-evt-nav-label">Next →</span>
              <span class="ep-evt-nav-title">${next.title}</span>
              <span class="ep-evt-nav-date">${fmtShort(next.date)}</span>
            </a>`;
          } else {
            html += '<div style="flex:1"></div>';
          }
          html += '</div>';
          document.getElementById('epEvtNav').innerHTML = html;

          // Keyboard arrow navigation
          document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowLeft' && prev) location.href = `event.html?id=${prev.id}${suffix}`;
            if (e.key === 'ArrowRight' && next) location.href = `event.html?id=${next.id}${suffix}`;
          });
        } catch {}
      }

      updateNavLoginState();
      loadEvent();
    </script>
  </body>
</html>
